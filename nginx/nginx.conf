events {
  worker_connections 1024;
}

http {
  # ── Upstream (Service Discovery simplificado) ─────────────────────────────
  upstream bff {
    server bff-service:4000;
  }

  upstream inventory {
    server inventory-service:4001;
  }

  upstream orders {
    server orders-service:4002;
  }

  upstream shipping {
    server shipping-service:4003;
  }

  upstream payment {
    server payment-service:4004;
  }

  upstream frontend {
    server frontend:3000;
  }

  # ── Logging ───────────────────────────────────────────────────────────────
  log_format main '$remote_addr - $request_time s - $status - "$request"';
  access_log /var/log/nginx/access.log main;
  error_log  /var/log/nginx/error.log warn;

  # ── Rate Limiting (Circuit Breaker básico) ────────────────────────────────
  limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

  server {
    listen 80;
    server_name localhost;

    # ── CORS Global ──────────────────────────────────────────────────────────
    add_header Access-Control-Allow-Origin  "*" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;

    if ($request_method = OPTIONS) {
      return 204;
    }

    # ── API Gateway: rutas hacia microservicios ───────────────────────────────
    location /api/ {
      limit_req zone=api burst=20 nodelay;
      proxy_pass         http://bff;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_read_timeout 30s;
      proxy_connect_timeout 5s;

      # Circuit Breaker: si BFF falla, responde 503
      proxy_next_upstream error timeout http_503;
    }

    # ── Frontend ─────────────────────────────────────────────────────────────
    location / {
      proxy_pass http://frontend;
      proxy_set_header Host $host;
    }

    # ── Health Check global ───────────────────────────────────────────────────
    location /health {
      return 200 '{"status":"ok","service":"api-gateway"}';
      add_header Content-Type application/json;
    }
  }
}
