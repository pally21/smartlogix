events {
  worker_connections 1024;
}

http {
  # ── Upstream (Service Discovery simplificado) ─────────────────────────────
  upstream bff {
    server bff-service:4000;
  }

  upstream inventory {
    server inventory-service:4001;
  }

  upstream orders {
    server orders-service:4002;
  }

  upstream shipping {
    server shipping-service:4003;
  }

  upstream payment {
    server payment-service:4004;
  }

  upstream frontend {
    server frontend:3000;
  }

  # ── Logging ───────────────────────────────────────────────────────────────
  log_format main '$remote_addr - $request_time s - $status - "$request"';
  access_log /var/log/nginx/access.log main;
  error_log  /var/log/nginx/error.log warn;

  # ── Rate Limiting (Circuit Breaker básico) ────────────────────────────────
  limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;


  server {
    listen 80;
    server_name localhost;

    # Redirect all HTTP to HTTPS
    return 301 https://$host$request_uri;
  }

  # ── HTTPS server with TLS (OpenResty) ──────────────────────────────────────
  server {
    listen 443 ssl http2;
    server_name localhost;

    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;

    # ── CORS Global ──────────────────────────────────────────────────────────
    add_header Access-Control-Allow-Origin  "*" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;

    if ($request_method = OPTIONS) {
      return 204;
    }

    # Allow unauthenticated auth endpoints to reach BFF
    location /api/auth/ {
      proxy_pass         http://bff;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── API Gateway: rutas hacia microservicios (JWT validation here) ────────
    location /api/ {
      limit_req zone=api burst=20 nodelay;

      # Validate JWT using Lua (OpenResty)
      access_by_lua_file /usr/local/openresty/lualib/validate_jwt.lua;

      proxy_pass         http://bff;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_read_timeout 30s;
      proxy_connect_timeout 5s;

      # Evita que el browser cachee respuestas de la API
      add_header Cache-Control "no-store, no-cache, must-revalidate" always;
      add_header Pragma "no-cache" always;
      expires off;

      # Circuit Breaker: si BFF falla, responde 503
      proxy_next_upstream error timeout http_503;
    }

    # ── Frontend ─────────────────────────────────────────────────────────────
    location / {
      proxy_pass http://frontend;
      proxy_set_header Host $host;
    }

    # ── Health Check global ───────────────────────────────────────────────────
    location /health {
      return 200 '{"status":"ok","service":"api-gateway"}';
      add_header Content-Type application/json;
    }
  }
}
